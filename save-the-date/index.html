<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Save The Date | Basir & Noor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/styles.css" />
</head>
<body class="save-date-body">
  <header class="site-header">
    <a class="brand" href="/">Basir & Noor</a>
    <nav class="site-nav">
      <a href="/">Home</a>
      <a href="/details">Details</a>
      <a href="/rsvp">RSVP</a>
      <a href="/save-the-date" aria-current="page">Save The Date</a>
    </nav>
  </header>

  <main class="content-page save-date-page">
    <section class="scratch-card-wrap">
      <p class="eyebrow save-date-kicker">Scratch to Reveal</p>
      <div class="scratch-stage" id="scratchStage">
        <div class="reveal-card" id="revealCard">
          <p class="save-date-title">Save The Date</p>
          <div class="heart-scratch-wrap">
            <div class="heart-reveal-content">
              <p class="message">Join us, as our forever begins October 9th, 2026.</p>
              <p class="date-line">October 9, 2026</p>
              <p class="couple">Basir & Noor</p>
              <p class="countdown" id="countdown">Loading countdown...</p>
            </div>
            <canvas id="scratchCanvas" aria-label="Scratch card"></canvas>
          </div>
        </div>
        <div id="roseLayer" class="rose-layer" aria-hidden="true"></div>
      </div>
      <a class="btn" href="/rsvp">RSVP Here</a>
    </section>
  </main>

  <footer class="site-footer">October 9, 2026</footer>
  <script src="/assets/js/save-date.js" defer></script>
</body>
</html>
